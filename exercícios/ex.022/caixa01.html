<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1{
            background-color: lightgray;
            width: 300px;
            height: 300px;
            
            padding: 10px;

            border: 10px solid brown;
            
            
            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 50px;
            margin-left: 10px;
            
            
            outline-width: 10px;
            outline-style: dashed;
            outline-color: salmon;
            
        }

        a{
            border-style: solid;
            border-color: rgb(252, 140, 2);


        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa de box-level</h1>
    <p>Parágrafos são exemploos de box-level, mas <a href="">links são exemplos de inline-level</a> Vamos ver como tudo isso funciona</p>
</body>
</html>
