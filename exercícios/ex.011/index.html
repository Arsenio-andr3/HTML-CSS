<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos ou simplismente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/fotoP.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="imagens/fotoM.png" type="image/png">
        <img src="imagens/fotoG.png" alt="Imagem flexível">
    </picture>
    <h1>Reproduzindo áudios</h1>
    <h2>Vamos aprender a reproduzir áudios em HTML5</h2>
    <p>Forma1, usando audio e src</p>
    <audio src="midia/Holding On - Telecasted.mp3" controls autopla></audio>
    <p>Forma 2 usando audio e sourc</p>
    <img src="imagens/Hibrido2.jpeg" alt="imagem">
    <p></p>
    <audio preload="metadata" controls loop> 
        <source src="midia/Allen Halloween - S.O.S Mundo.mp3.mpeg" type="audio/mpeg">
        <p>Não foi possível reproduzir o audio mp3 clique <a href="midia/Allen Halloween - S.O.S Mundo.mp3.mpeg">aqui para baixar</a> </p>
    </audio>
    <p></p>
</body>
</html>
